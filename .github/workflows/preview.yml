name: Quarto Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2

      - name: Resolve rendered output directory
        run: |
          if [ -d "_book" ]; then
            echo "QUARTO_OUTPUT=./_book" >> "$GITHUB_ENV"
          elif [ -d "_site" ]; then
            echo "QUARTO_OUTPUT=./_site" >> "$GITHUB_ENV"
          else
            mkdir -p _site
            qmd_files=()
            while IFS= read -r -d '' qmd_file; do
              qmd_files+=("$qmd_file")
            done < <(find . -maxdepth 1 -type f -name '*.qmd' -print0)
            html_files=()
            for qmd_file in "${qmd_files[@]}"; do
              html_file="${qmd_file%.qmd}.html"
              if [ -f "$html_file" ]; then
                html_files+=("$html_file")
              fi
            done
            if [ ${#html_files[@]} -gt 0 ]; then
              for html_file in "${html_files[@]}"; do
                cp "$html_file" _site/
              done
              echo "QUARTO_OUTPUT=./_site" >> "$GITHUB_ENV"
            else
              echo "No rendered output found. Ensure Quarto render succeeded and produced _book/, _site/, or .html output from top-level .qmd files."
              exit 1
            fi
          fi

      - name: Ensure preview index page exists
        run: |
          if [ ! -f "${{ env.QUARTO_OUTPUT }}/index.html" ]; then
            first_html="$(find "${{ env.QUARTO_OUTPUT }}" -maxdepth 1 -type f -name '*.html' | head -n 1)"
            if [ -n "$first_html" ]; then
              cp "$first_html" "${{ env.QUARTO_OUTPUT }}/index.html"
            fi
          fi
          if [ ! -f "${{ env.QUARTO_OUTPUT }}/index.html" ]; then
            echo "Failed to create index.html: no HTML files found in output directory"
            exit 1
          fi

      - name: Deploy PR Preview
        id: preview-step
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ${{ env.QUARTO_OUTPUT }}/
          action: ${{ github.event.action == 'closed' && 'remove' || 'deploy' }}
          preview-branch: gh-pages
          comment: "false"
          wait-for-pages-deployment: false

      - uses: marocchino/sticky-pull-request-comment@v2
        if: steps.preview-step.outputs.deployment-action == 'deploy'
        with:
          header: pr-preview
          recreate: true
          message: |
            [PR Preview Action](https://github.com/rossjrw/pr-preview-action) ${{ steps.preview-step.outputs.action-version }}
            :---:
            | <p><img src="https://qr.rossjrw.com/?url=${{ steps.preview-step.outputs.preview-url }}" height="100" align="right" alt="QR code for preview link"></p> :rocket: View preview at <br> ${{ steps.preview-step.outputs.preview-url }} <br><br>
            | <h6>Built to branch [`gh-pages`](${{ github.server_url }}/${{ github.repository }}/tree/gh-pages) at ${{ steps.preview-step.outputs.action-start-time }}. <br> Preview will be ready when the [GitHub Pages deployment](${{ github.server_url }}/${{ github.repository }}/deployments) is complete. <br><br> </h6>

      - uses: marocchino/sticky-pull-request-comment@v2
        if: steps.preview-step.outputs.deployment-action == 'remove'
        with:
          header: pr-preview
          recreate: true
          message: |
            [PR Preview Action](https://github.com/rossjrw/pr-preview-action) ${{ steps.preview-step.outputs.action-version }}
            :---:
            Preview removed because the pull request was closed.
            ${{ steps.preview-step.outputs.action-start-time }}
